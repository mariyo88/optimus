<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Modern Category Filter - Static Test</title>
    
    <!-- Bootstrap -->
    <link type="text/css" rel="stylesheet" href="css/bootstrap.min.css"/>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="css/font-awesome.min.css">
    
    <!-- Modern Category Filter CSS -->
    <link type="text/css" rel="stylesheet" href="css/category-modern.css"/>
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            padding: 30px;
            background: #f5f5f5;
        }
        .test-container {
            max-width: 400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #2B2D42;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Modern Category Filter Test</h1>
        
        <div id="category-filter-test">
            <!-- Modern category filter structure -->
            <div class="modern-category-filter">
                
                <!-- Header -->
                <div class="category-header">
                    <div class="category-header-icon">
                        <i></i><i></i><i></i>
                    </div>
                    <div class="category-header-title">All Departments</div>
                </div>
                
                <!-- Category List -->
                <div class="category-list">
                    
                    <!-- Headphone Category (Parent) -->
                    <div class="modern-category-item has-children" data-slug="headphone">
                        <a class="category-link">
                            <span class="category-icon"><i class="fa fa-headphones"></i></span>
                            <span class="category-name-text">Headphone</span>
                            <span class="category-chevron"><i class="fa fa-angle-right"></i></span>
                        </a>
                        <div class="category-children">
                            <div class="modern-category-item" data-slug="earbuds">
                                <a class="category-link">
                                    <span class="category-icon"><i class="fa fa-headphones"></i></span>
                                    <span class="category-name-text">Earbuds</span>
                                </a>
                            </div>
                            <div class="modern-category-item" data-slug="on-ear">
                                <a class="category-link">
                                    <span class="category-icon"><i class="fa fa-headphones"></i></span>
                                    <span class="category-name-text">On Ear</span>
                                </a>
                            </div>
                            <div class="modern-category-item" data-slug="over-ear">
                                <a class="category-link">
                                    <span class="category-icon"><i class="fa fa-headphones"></i></span>
                                    <span class="category-name-text">Over Ear</span>
                                </a>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Laptop & Tablet (Parent) -->
                    <div class="modern-category-item has-children" data-slug="laptop-tablet">
                        <a class="category-link">
                            <span class="category-icon"><i class="fa fa-laptop"></i></span>
                            <span class="category-name-text">Laptop & Tablet</span>
                            <span class="category-chevron"><i class="fa fa-angle-right"></i></span>
                        </a>
                        <div class="category-children">
                            <div class="modern-category-item" data-slug="laptop">
                                <a class="category-link">
                                    <span class="category-icon"><i class="fa fa-laptop"></i></span>
                                    <span class="category-name-text">Laptop</span>
                                </a>
                            </div>
                            <div class="modern-category-item" data-slug="tablet">
                                <a class="category-link">
                                    <span class="category-icon"><i class="fa fa-tablet"></i></span>
                                    <span class="category-name-text">Tablet</span>
                                </a>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Gaming Accessories (Leaf) -->
                    <div class="modern-category-item" data-slug="gaming">
                        <a class="category-link">
                            <span class="category-icon"><i class="fa fa-gamepad"></i></span>
                            <span class="category-name-text">Gaming Accessories</span>
                        </a>
                    </div>
                    
                    <!-- Smartphone (Leaf) -->
                    <div class="modern-category-item" data-slug="smartphone">
                        <a class="category-link">
                            <span class="category-icon"><i class="fa fa-mobile"></i></span>
                            <span class="category-name-text">Smartphone</span>
                        </a>
                    </div>
                    
                    <!-- Camera & Video (Leaf) -->
                    <div class="modern-category-item" data-slug="camera">
                        <a class="category-link">
                            <span class="category-icon"><i class="fa fa-camera"></i></span>
                            <span class="category-name-text">Camera & Video</span>
                        </a>
                    </div>
                    
                    <!-- Smartwatch (Leaf) -->
                    <div class="modern-category-item" data-slug="smartwatch">
                        <a class="category-link">
                            <span class="category-icon"><i class="fa fa-clock-o"></i></span>
                            <span class="category-name-text">Smartwatch</span>
                        </a>
                    </div>
                    
                    <!-- Storage & Digital Devices (Leaf) -->
                    <div class="modern-category-item" data-slug="storage">
                        <a class="category-link">
                            <span class="category-icon"><i class="fa fa-hdd-o"></i></span>
                            <span class="category-name-text">Storage & Digital Devices</span>
                        </a>
                    </div>
                    
                    <!-- Server & Workstation (Leaf) -->
                    <div class="modern-category-item" data-slug="server">
                        <a class="category-link">
                            <span class="category-icon"><i class="fa fa-server"></i></span>
                            <span class="category-name-text">Server & Workstation</span>
                        </a>
                    </div>
                    
                    <!-- TV & Computer Screen (Leaf) -->
                    <div class="modern-category-item" data-slug="screen">
                        <a class="category-link">
                            <span class="category-icon"><i class="fa fa-desktop"></i></span>
                            <span class="category-name-text">TV & Computer Screen</span>
                        </a>
                    </div>
                    
                </div>
            </div>
        </div>
        
        <div style="margin-top: 30px; padding: 20px; background: white; border-radius: 5px;">
            <h4>Selected Category:</h4>
            <p id="selected-category" style="color: #ef233c; font-weight: bold;">None</p>
        </div>
    </div>
    
    <!-- jQuery -->
    <script src="js/jquery.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // Click on header to reset
            $('.category-header').on('click', function() {
                $('.modern-category-item').removeClass('selected');
                $('.category-link').removeClass('active');
                $('#selected-category').text('All Products');
            });
            
            // Click on parent category (with children) - toggle expand/collapse
            $('.modern-category-item.has-children > .category-link').on('click', function(e) {
                e.preventDefault();
                var $item = $(this).closest('.modern-category-item');
                var $children = $item.find('> .category-children');
                var $chevron = $(this).find('.category-chevron i');
                
                if ($children.is(':visible')) {
                    $children.slideUp(300);
                    $chevron.removeClass('fa-angle-down').addClass('fa-angle-right');
                } else {
                    $children.slideDown(300);
                    $chevron.removeClass('fa-angle-right').addClass('fa-angle-down');
                }
            });
            
            // Click on leaf category - select
            $('.modern-category-item:not(.has-children) .category-link').on('click', function(e) {
                e.preventDefault();
                var $item = $(this).closest('.modern-category-item');
                var categoryName = $item.find('.category-name-text').text();
                var slug = $item.data('slug');
                
                // Remove previous selection
                $('.modern-category-item').removeClass('selected');
                $('.category-link').removeClass('active');
                
                // Add selection
                $item.addClass('selected');
                $(this).addClass('active');
                
                // Update display
                $('#selected-category').text(categoryName + ' (' + slug + ')');
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>404 - Stranica nije pronađena | Optimus</title>
    
    <!-- Google font -->
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,500,700" rel="stylesheet">
    
    <!-- Font Awesome Icon -->
    <link rel="stylesheet" href="css/font-awesome.min.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #171e45 0%, #293681 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            overflow-x: hidden;
        }
        
        .error-container {
            text-align: center;
            padding: 20px;
            max-width: 700px;
            width: 100%;
            position: relative;
            z-index: 2;
        }
        
        /* Animated Background Elements */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }
        
        .bg-decoration::before,
        .bg-decoration::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(66, 116, 217, 0.1);
            animation: float 8s infinite ease-in-out;
        }
        
        .bg-decoration::before {
            width: 300px;
            height: 300px;
            top: -150px;
            right: -150px;
            animation-delay: 0s;
        }
        
        .bg-decoration::after {
            width: 400px;
            height: 400px;
            bottom: -200px;
            left: -200px;
            animation-delay: 2s;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0) scale(1);
                opacity: 0.1;
            }
            50% {
                transform: translateY(-30px) scale(1.1);
                opacity: 0.15;
            }
        }
        
        /* Error Number */
        .error-number {
            font-size: 180px;
            font-weight: 700;
            color: #4274D9;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 10px 40px rgba(66, 116, 217, 0.3);
            animation: glitch 3s infinite;
            position: relative;
        }
        
        @keyframes glitch {
            0%, 90%, 100% {
                transform: translate(0);
            }
            92% {
                transform: translate(-2px, 2px);
            }
            94% {
                transform: translate(2px, -2px);
            }
            96% {
                transform: translate(-2px, -2px);
            }
            98% {
                transform: translate(2px, 2px);
            }
        }
        
        /* Icon */
        .error-icon {
            background: rgba(255, 255, 255, 0.95);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: pulse 2s infinite;
        }
        
        .error-icon i {
            font-size: 60px;
            color: #4274D9;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 25px 70px rgba(66, 116, 217, 0.4);
            }
        }
        
        /* Content Card */
        .error-content {
            background: rgba(255, 255, 255, 0.98);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .error-title {
            font-size: 32px;
            font-weight: 700;
            color: #293681;
            margin-bottom: 15px;
        }
        
        .error-message {
            font-size: 16px;
            color: #8D99AE;
            margin-bottom: 35px;
            line-height: 1.6;
        }
        
        /* Buttons */
        .error-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
        }
        
        .btn-primary {
            background-color: #4274D9;
            color: #FFF;
            box-shadow: 0 10px 30px rgba(66, 116, 217, 0.3);
        }
        
        .btn-primary:hover {
            background-color: #293681;
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(66, 116, 217, 0.4);
        }
        
        .btn-secondary {
            background-color: #293681;
            color: #FFF;
            box-shadow: 0 10px 30px rgba(43, 45, 66, 0.3);
        }
        
        .btn-secondary:hover {
            background-color: #1e2756;
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(43, 45, 66, 0.4);
        }
        
        .btn i {
            font-size: 16px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .error-number {
                font-size: 120px;
            }
            
            .error-content {
                padding: 40px 25px;
            }
            
            .error-title {
                font-size: 24px;
            }
            
            .error-message {
                font-size: 14px;
            }
            
            .error-icon {
                width: 100px;
                height: 100px;
            }
            
            .error-icon i {
                font-size: 50px;
            }
            
            .error-actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
        
        @media (max-width: 480px) {
            .error-number {
                font-size: 90px;
            }
            
            .error-content {
                padding: 30px 20px;
            }
            
            .error-title {
                font-size: 20px;
            }
            
            .error-icon {
                width: 80px;
                height: 80px;
                margin-bottom: 20px;
            }
            
            .error-icon i {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Decoration -->
    <div class="bg-decoration"></div>
    
    <!-- Error Container -->
    <div class="error-container">
        <div class="error-number" role="status" aria-label="Greška 404">404</div>
        
        <div class="error-content">
            <div class="error-icon" aria-hidden="true">
                <i class="fa fa-map-signs"></i>
            </div>
            
            <h1 class="error-title">Stranica nije pronađena</h1>
            
            <p class="error-message">
                Ups! Stranica koju tražite ne postoji ili je premeštena. 
                Možda je link zastario ili ste uneli pogrešnu adresu.
            </p>
            
            <div class="error-actions">
                <a href="index.html" class="btn btn-primary">
                    <i class="fa fa-home"></i>
                    Nazad na početnu
                </a>
                <button onclick="window.history.back()" class="btn btn-secondary">
                    <i class="fa fa-arrow-left"></i>
                    Prethodna stranica
                </button>
            </div>
        </div>
    </div>
    
    <script>
        // Prevent form resubmission on back button
        if (window.history.replaceState) {
            window.history.replaceState(null, null, window.location.href);
        }
    </script>
</body>
</html>
